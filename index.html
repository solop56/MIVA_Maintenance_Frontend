<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - MIVA Maintenance</title>
    <link rel="stylesheet" href="css/style.css?v=4">
</head>

<body>
    <nav>
        <h1>MIVA Maintenance Portal</h1>
    </nav>
    <main style="max-width: 400px; margin-top: 5rem;">
        <div id="alertBox" class="alert"></div>
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 1.5rem; color: #1e3a8a;">Account Login</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="authEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="authPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </div>
    </main>
    <script src="js/app.js?v=4"></script>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem("token")) {
            const role = parseInt(localStorage.getItem("role_id"));
            if (role === 1) window.location.href = 'admin.html';
            else if (role === 2) window.location.href = 'maintenance.html';
            else window.location.href = 'student.html';
        }
    </script>
</body>

</html>
