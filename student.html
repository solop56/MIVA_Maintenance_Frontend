<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard — MIVA Maintenance</title>
    <meta name="description" content="Student workspace for submitting and tracking maintenance service requests at MIVA Open University.">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <h1>Student Workspace</h1>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </nav>
    <main>
        <div id="alertBox" class="alert"></div>
        <div class="card">
            <div class="card-header">
                <h2>My Service Requests</h2>
                <button class="btn-success" onclick="openModal('requestModal')">New Request</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody"></tbody>
            </table>
        </div>
    </main>

    <div id="requestModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 1rem;">Submit Maintenance Complaint</h3>
            <form onsubmit="submitRequest(event)">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="reqTitle" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="reqCategory" class="form-control">
                        <option value="1">Electricity</option>
                        <option value="2">Furniture</option>
                        <option value="3">Plumbing</option>
                        <option value="4">Internet/IT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="reqDesc" class="form-control" required></textarea>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 1rem;">
                    <button type="button" class="btn-secondary" onclick="closeModal('requestModal')">Cancel</button>
                    <button type="submit" class="btn-primary" style="width: auto;">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        verifyAccess(3); // Role 3 = Student/Staff[cite: 1]

        // Check if password change is required
        checkForceChangePassword();

        async function loadRequests() {
            const data = await apiGet("/requests/");
            const tbody = document.getElementById("studentTableBody");
            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="4">
                        <div class="empty-state">
                            <div class="empty-icon">📋</div>
                            <p>No service requests yet. Submit your first one!</p>
                        </div>
                    </td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>#${r.id}</td>
                    <td>${r.title}</td>
                    <td><span class="badge badge-${r.status.toLowerCase()}">${r.status}</span></td>
                    <td>${new Date(r.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        async function submitRequest(e) {
            e.preventDefault();
            const payload = {
                title: document.getElementById("reqTitle").value,
                category_id: parseInt(document.getElementById("reqCategory").value),
                description: document.getElementById("reqDesc").value
            };
            const res = await fetch(`${API_URL}/requests/`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${localStorage.getItem("token")}` },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                showAlert("Request submitted!");
                closeModal("requestModal");
                loadRequests();
            }
        }
        loadRequests();
    </script>
</body>

</html>
