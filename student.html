<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard — MIVA Maintenance</title>
    <meta name="description" content="Student workspace for submitting and tracking maintenance service requests at MIVA Open University.">
    <link rel="stylesheet" href="css/style.css?v=4">
</head>

<body>
    <nav>
        <h1>Student Workspace</h1>
        <div class="nav-right">
            <span id="navUserGreeting" class="nav-greeting"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>
    <main>
        <div id="alertBox" class="alert"></div>
        <div class="card">
            <div class="card-header">
                <h2>My Service Requests</h2>
                <button class="btn-success" onclick="openModal('requestModal')">New Request</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Assigned To</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody"></tbody>
            </table>
        </div>
    </main>

    <!-- New Request Modal -->
    <div id="requestModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 1rem;">Submit Maintenance Complaint</h3>
            <form onsubmit="submitRequest(event)">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="reqTitle" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="reqCategory" class="form-control">
                        <option value="1">Electricity</option>
                        <option value="2">Furniture</option>
                        <option value="3">Plumbing</option>
                        <option value="4">Internet/IT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="reqPriority" class="form-control">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="reqDesc" class="form-control" required></textarea>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 1rem;">
                    <button type="button" class="btn-secondary" onclick="closeModal('requestModal')">Cancel</button>
                    <button type="submit" class="btn-primary" style="width: auto;">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js?v=4"></script>
    <script>
        verifyAccess(3); // Role 3 = Student/Staff
        displayUserName();

        // Check if password change is required
        checkForceChangePassword();

        const CATEGORY_MAP = { 1: 'Electricity', 2: 'Furniture', 3: 'Plumbing', 4: 'Internet/IT' };

        function getPriorityBadge(priority) {
            const cls = {
                'High':   'badge-priority-high',
                'Medium': 'badge-priority-medium',
                'Low':    'badge-priority-low'
            }[priority] || 'badge-priority-medium';
            return `<span class="badge ${cls}">${priority || 'Medium'}</span>`;
        }

        async function loadRequests() {
            try {
                const data = await apiGet("/requests/");
                if (!Array.isArray(data)) {
                    if (data && data.detail) {
                        showAlert(data.detail, false);
                    }
                    const tbody = document.getElementById("studentTableBody");
                    tbody.innerHTML = `
                        <tr><td colspan="8">
                            <div class="empty-state">
                                <div class="empty-icon">📋</div>
                                <p>No service requests found.</p>
                            </div>
                        </td></tr>`;
                    return;
                }
                cacheRequestsData(data);
                const tbody = document.getElementById("studentTableBody");
                if (data.length === 0) {
                    tbody.innerHTML = `
                        <tr><td colspan="8">
                            <div class="empty-state">
                                <div class="empty-icon">📋</div>
                                <p>No service requests yet. Submit your first one!</p>
                            </div>
                        </td></tr>`;
                    return;
                }
                tbody.innerHTML = data.map(r => {
                    const categoryName = r.category ? r.category.name : (CATEGORY_MAP[r.category_id] || `Cat #${r.category_id}`);
                    const assignedTo = r.assigned_to_name
                        ? `<span style="font-size:0.85rem; color:#1e3a8a; font-weight:600;">${r.assigned_to_name}</span>`
                        : `<span style="color:#9ca3af; font-size:0.82rem;">Unassigned</span>`;
                    const statusText = r.status || 'Pending';
                    const statusCls = statusText.toLowerCase().replace(/ /g, '-');

                    return `
                    <tr>
                        <td>#${r.id}</td>
                        <td>
                            <a href="javascript:void(0)" onclick="openRequestDetailsModal(${r.id})" 
                               style="color: #1e3a8a; text-decoration: none; cursor: pointer;" 
                               title="Click to view details"
                               onmouseover="this.style.textDecoration='underline'" 
                               onmouseout="this.style.textDecoration='none'">
                                <strong>${r.title}</strong>
                            </a>
                        </td>
                        <td><span class="badge badge-category">${categoryName}</span></td>
                        <td>${getPriorityBadge(r.priority)}</td>
                        <td><span class="badge badge-${statusCls}">${statusText}</span></td>
                        <td>${assignedTo}</td>
                        <td>${new Date(r.created_at).toLocaleDateString()}</td>
                        <td>
                            <button class="btn-secondary" style="padding:0.3rem 0.6rem; font-size:0.82rem;" onclick="openRequestDetailsModal(${r.id})">Details</button>
                        </td>
                    </tr>
                `}).join('');
            } catch (err) {
                console.error("Failed to load requests:", err);
            }
        }

        async function submitRequest(e) {
            e.preventDefault();
            const payload = {
                title: document.getElementById("reqTitle").value,
                category_id: parseInt(document.getElementById("reqCategory").value),
                priority: document.getElementById("reqPriority").value,
                description: document.getElementById("reqDesc").value
            };
            const res = await fetch(`${API_URL}/requests/`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${localStorage.getItem("token")}` },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                showAlert("Request submitted!");
                closeModal("requestModal");
                document.querySelector('#requestModal form').reset();
                loadRequests();
            } else {
                const data = await res.json();
                showAlert(data.detail || "Failed to submit request.", false);
            }
        }
        loadRequests();
    </script>
</body>

</html>
